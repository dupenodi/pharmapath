services:
  - type: web
    name: easemed-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install uv && uv sync --frozen"
    startCommand: "uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: AGENT_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: GRAPH_SCOPE
        value: rx_only
      - key: CORS_ORIGINS
        value: '["*"]'
